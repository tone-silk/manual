<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケットフジタアプリ セットアップマニュアル</title>
  <style>
    :root {
      --blue: #5b35d5;
      --blue-dark: #2d1f7a;
      --ink: #202124;
      --muted: #667085;
      --paper: #ffffff;
      --bg: #f3f6fb;
      --notice: #fff7db;
      --notice-line: #e8aa00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .manual-container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    .manual-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .manual-title h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.35;
      color: var(--blue-dark);
    }

    .manual-title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .manual-layout {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .phone-frame {
      width: min(320px, 86vw);
      padding: 6px;
      background: #101216;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(16, 24, 40, 0.18);
      flex: 0 0 auto;
    }

    .phone-screen {
      width: 100%;
      aspect-ratio: 593 / 1280;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .description-area {
      width: 460px;
      background: var(--paper);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    .step-count {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .description-area h2 {
      margin: 0 0 12px;
      font-size: 23px;
      line-height: 1.45;
      color: var(--blue-dark);
    }

    .description-area p {
      margin: 0 0 14px;
      line-height: 1.85;
      font-size: 15px;
    }

    .action-list {
      margin: 0;
      padding-left: 1.2em;
    }

    .action-list li {
      margin-bottom: 8px;
      line-height: 1.75;
      font-size: 15px;
    }

    .notice {
      margin-top: 18px;
      padding: 13px 14px;
      background: var(--notice);
      border-left: 5px solid var(--notice-line);
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
    }

    .button-area {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .nav-button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s, opacity 0.15s;
    }

    .nav-button:active:not(:disabled) { transform: translateY(1px); }

    .prev-button {
      background: #e6ebf2;
      color: #263142;
    }

    .next-button {
      background: var(--blue);
      color: #fff;
    }

    .nav-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .progress {
      margin-top: 20px;
      height: 8px;
      background: #e2e7ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--blue);
      width: 0%;
      transition: width 0.3s;
    }

    @media (max-width: 820px) {
      .manual-container { padding: 22px 14px 28px; }
      .manual-title h1 { font-size: 23px; }
      .manual-layout { gap: 22px; }
      .description-area {
        width: 100%;
        padding: 20px;
      }
      .phone-frame {
        width: min(300px, 86vw);
      }
    }
  </style>
</head>

<body>
  <main class="manual-container">
    <div class="manual-title">
      <h1>ポケットフジタアプリ セットアップマニュアル</h1>
      <p>初回起動時のセットアップ方法（Android）</p>
    </div>

    <div class="manual-layout">
      <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen"></div>
      </div>

      <section class="description-area" aria-live="polite">
        <div class="step-count" id="stepCount"></div>
        <h2 id="stepTitle"></h2>
        <p id="stepDescription"></p>
        <ul class="action-list" id="stepActions"></ul>
        <div class="notice" id="stepNotice"></div>

        <div class="button-area">
          <button class="nav-button prev-button" id="prevButton" type="button">戻る</button>
          <button class="nav-button next-button" id="nextButton" type="button">次へ</button>
        </div>

        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const steps = [
      {
        title: "案内を確認する",
        description: "概要説明を確認し、初期設定を進めます。",
        actions: ["「次へ」をタップします。"],
        notice: "以降の画面でも、案内を確認しながら次へ進みます。",
        screenImage: "images/step1.png"
      },
      {
        title: "できることを確認する",
        description: "アプリでできることや利用イメージを確認します。",
        actions: ["「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step2.png"
      },
      {
        title: "本人確認の説明を確認する",
        description: "本人確認によって利用できる内容を確認します。",
        actions: ["「次へ」をタップします。"],
        notice:"",
        screenImage: "images/step3.png"
      },
      {
        title: "データ管理",
        description: "データ管理に関する説明を読みます。",
        actions: ["「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step4.png"
      },
      {
        title: "次回以降の説明表示",
        description: "画面上に確認ダイアログが表示された場合は、内容を確認して閉じます。",
        actions: ["次回も説明を表示させる場合は「表示する」を選択します。", "表示させない場合は「表示しない」を選択します。"],
        notice: "ダイアログが表示されない場合は、そのまま次の画面へ進みます。",
        screenImage: "images/step5.png"
      },
      {
        title: "本人確認・診察券情報の入力へ進む",
        description: "診療データの閲覧などに必要な本人確認を実施します。",
        actions: ["「今すぐ始める」をタップして入力画面へ進みます。"],
        notice: "本人確認にはマイナンバーカードが必要です。",
        screenImage: "images/step6.png"
      },
      {
        title: "入力開始を確認する",
        description: "本人確認・診察券情報の入力を開始する確認画面が表示されます。",
        actions: ["「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step7.png"
      },
      {
        title: "連携前の案内を確認する",
        description: "利用に関する注意事項を確認します。",
        actions: ["「いいえ、該当しません」をタップして進みます。"],
        notice: "",
        screenImage: "images/step8.png"
      },
      {
        title: "利用規約を確認する",
        description: "フリービットと藤田医科大学の利用規約を確認します。",
        actions: ["「同意する」をタップします。"],
        notice: "",
        screenImage: "images/step9.png"
      },
      {
        title: "利用状況のデータ取得に同意する",
        description: "アプリ利用に関する同意事項を確認します。",
        actions: ["必要なチェック項目にチェックを入れます。", "「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step10.png"
      },
      {
        title: "アクセス権限の許可",
        description: "アプリからの通知に関する許可を設定します。",
        actions: ["「設定する」をタップします。"],
        notice: "",
        screenImage: "images/step11.png"
      },
      {
        title: "通知の許可",
        description: "端末の通知許可ダイアログが表示されたら許可します。",
        actions: ["「許可」をタップします。"],
        notice: "端末やOSのバージョンにより、表示が異なる場合があります。",
        screenImage: "images/step12.png"
      },
      {
        title: "本人確認の手順",
        description: "本人確認の流れと必要な手順を確認します。",
        actions: ["マイナンバーカードを手元に用意します。", "「マイナンバーカードで本人確認」をタップします。"],
        notice: "この後、マイナンバーカードを使った認証へ進みます。",
        screenImage: "images/step13.png"
      },
      {
        title: "ログイン認証",
        description: "端末またはアプリのログイン認証を行います。",
        actions: ["表示された認証画面を確認します。", "PINや生体認証など、端末の案内に従って認証します。"],
        notice: "認証方法は端末設定により異なります。",
        screenImage: "images/step14.png"
      },
      {
        title: "読み込み中",
        description: "読み込み画面が表示されたら、そのまま待ちます。",
        actions: ["処理が完了するまで操作せず待ちます。", "次の画面に切り替わるまでアプリを閉じないでください。"],
        notice: "通信状況により時間がかかる場合があります。",
        screenImage: "images/step15.png"
      },
      {
        title: "認証を開始する",
        description: "本人確認の認証手順を開始します。",
        actions: ["「はじめる」をタップします。"],
        notice: "暗証番号入力とカード読み取りへ進みます。",
        screenImage: "images/step16.png"
      },
      {
        title: "暗証番号の入力",
        description: "マイナンバーカードの暗証番号を入力します。",
        actions: ["4桁の暗証番号を入力します。","「次へ」をタップします。"],
        notice: "暗証番号の入力間違いに注意してください。ここで入力する暗証番号は「利用者証明用電子証明書」です。",
        screenImage: "images/step17.png"
      },
      {
        title: "暗証番号の入力（2回目）",
        description: "「券面事項入力補助用」の暗証番号を入力します。",
        actions: ["「利用者証明用電子証明書」と「券面事項入力補助用」の暗証番号が同一の場合は、「直前と同じ番号を入力」をタップします。異なる場合は「別の番号を入力」をタップします。"],
        notice: "",
        screenImage: "images/step18.png"
      },
      {
        title: "券面事項入力補助用の入力",
        description: "「券面事項入力補助用」の暗証番号が異なる場合は、入力を行います。",
        actions: ["暗証番号を入力後、「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step19.png"
      },
      {
        title: "カード読み取りを開始する",
        description: "マイナンバーカードの読み取り画面に進みます。",
        actions: ["カードの置き方を確認します。", "スマートフォンをカードに合わせます。", "「読み取り開始」をタップします。"],
        notice: "端末ごとの読み取り位置を確認すると、読み取りやすくなります。",
        screenImage: "images/step20.png"
      },
      {
        title: "カード読み取り",
        description: "端末をカードにかざします。",
        actions: ["カードを平らな場所に置きます。", "スマートフォンの背面をカードに合わせます。"],
        notice: "読み取り中は端末とカードを動かさないでください。",
        screenImage: "images/step21.png"
      },
      {
        title: "カード読み取り中",
        description: "カードを読み取っている間、そのまま待ちます。",
        actions: ["完了するまで端末を動かさず待ちます。"],
        notice: "ケースやカバーを外すと読み取りやすい場合があります。",
        screenImage: "images/step22.png"
      },
      {
        title: "読み取り完了",
        description: "カード読み取りが完了したことを確認します。",
        actions: ["次の画面へ進むまで待ちます。"],
        notice: "完了表示後も、画面が切り替わるまでアプリを閉じないでください。",
        screenImage: "images/step23.png"
      },
      {
        title: "連携サービスへの認証許可",
        description: "トラストアンカー連携サービスへの認証許可画面を確認します。",
        actions: ["スクロールして情報を確認します。"],
        notice: "",
        screenImage: "images/step24.png"
      },
      {
        title: "連携を許可する",
        description: "対象サービスや許可内容を確認します。",
        actions: ["「許可」をタップします。"],
        notice: "",
        screenImage: "images/step25.png"
      },
      {
        title: "サーバー送信",
        description: "許可後、サーバーへの送信処理が行われます。",
        actions: ["送信中の表示が消えるまで待ちます。", "処理中はアプリを閉じないでください。"],
        notice: "通信状況によって時間がかかることがあります。",
        screenImage: "images/step26.png"
      },
      {
        title: "認証完了",
        description: "認証が完了したことを確認します。",
        actions: ["「利用中のサービスへ戻る」をタップして戻ります。"],
        notice: "この画面が表示されれば、認証処理は完了しています。",
        screenImage: "images/step27.png"
      },
      {
        title: "診察券情報の入力",
        description: "藤田医科大学病院の診察券番号を入力します。",
        actions: ["入力後「連携する」をタップします。"],
        notice: "",
        screenImage: "images/step28.png"
      },
      {
        title: "診察券連携",
        description: "確認ダイアログの内容を確認して進みます。",
        actions: ["問題なければ「連携する」をタップします。"],
        notice: "",
        screenImage: "images/step29.png"
      },
      {
        title: "連携完了",
        description: "連携完了に関する確認ダイアログを確認します。",
        actions: ["「閉じる」をタップします。"],
        notice: "",
        screenImage: "images/step30.png"
      },
      {
        title: "認証方法の設定",
        description: "続けて認証方法を登録する案内が表示されます。",
        actions: ["「次へ」をタップします。"],
        notice: "",
        screenImage: "images/step31.png"
      },
      {
        title: "端末認証を行う",
        description: "認証方法登録のため、端末の認証を行います。",
        actions: ["表示された認証画面を確認します。", "PINや生体認証など、端末の案内に従って認証します。"],
        notice: "端末設定により、表示される認証方法が異なります。",
        screenImage: "images/step32.png"
      },
      {
        title: "ホーム画面",
        description: "ポケットフジタアプリのホーム画面が表示されることを確認します。",
        actions: ["読み込みが完了するまで待ちます。"],
        notice: "",
        screenImage: "images/step33.png"
      },
      {
        title: "設定完了",
        description: "ホーム画面で表示されるお知らせやステータスを確認します。",
        actions: [ "診察情報や「後払いする」のボタンが表示されていれば設定が完了しています。"],
        notice: "これで本人確認・連携手順は完了です。",
        screenImage: "images/step34.png"
      }
    ];

    let currentStep = 0;

    const phoneScreen = document.getElementById("phoneScreen");
    const stepCount = document.getElementById("stepCount");
    const stepTitle = document.getElementById("stepTitle");
    const stepDescription = document.getElementById("stepDescription");
    const stepActions = document.getElementById("stepActions");
    const stepNotice = document.getElementById("stepNotice");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const progressBar = document.getElementById("progressBar");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStep() {
      const step = steps[currentStep];

      phoneScreen.innerHTML = `<img src="${step.screenImage}" alt="${escapeHtml(step.title)}の画面">`;
      stepCount.textContent = `Step ${currentStep + 1} / ${steps.length}`;
      stepTitle.textContent = step.title;
      stepDescription.textContent = step.description;
      stepActions.innerHTML = step.actions.map((action) => `<li>${escapeHtml(action)}</li>`).join("");
      if (step.notice) {
      stepNotice.textContent = step.notice;
      stepNotice.style.display = "block";
      } else {
      stepNotice.textContent = "";
      stepNotice.style.display = "none";
      }

      prevButton.disabled = currentStep === 0;
      nextButton.textContent = currentStep === steps.length - 1 ? "完了" : "次へ";
      progressBar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
    }

    prevButton.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    });

    nextButton.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
      } else {
        alert("ポケットフジタアプリのセットアップは以上です。");
      }
    });

    renderStep();
  </script>
</body>
</html>
