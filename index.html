<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デジタル認証アプリ セットアップマニュアル</title>

  <style>
    :root {
      --blue: #0036d9;
      --blue-dark: #06237a;
      --ink: #202124;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #ffffff;
      --bg: #f3f6fb;
      --notice: #fff7db;
      --notice-line: #e8aa00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .manual-container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    .manual-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .manual-title h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.35;
      color: var(--blue-dark);
    }

    .manual-title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .manual-layout {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .phone-frame {
      width: 320px;
      height: 640px;
      background: #101216;
      border-radius: 36px;
      padding: 16px;
      box-shadow: 0 18px 42px rgba(16, 24, 40, 0.28);
      position: relative;
      flex: 0 0 auto;
    }

    .phone-frame::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 82px;
      height: 8px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #22262d;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tap-guide {
      position: absolute;
      border: 3px solid #ff4d5f;
      border-radius: 12px;
      animation: pulse 1.2s infinite;
      pointer-events: none;
    }

    .tap-label {
      position: absolute;
      background: #ff4d5f;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(255, 77, 95, 0.25);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 77, 95, 0.55); }
      70% { box-shadow: 0 0 0 12px rgba(255, 77, 95, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 77, 95, 0); }
    }

    .description-area {
      width: 460px;
      background: var(--paper);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    .step-count {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .description-area h2 {
      margin: 0 0 12px;
      font-size: 23px;
      line-height: 1.45;
      color: var(--blue-dark);
    }

    .description-area p {
      margin: 0 0 14px;
      line-height: 1.85;
      font-size: 15px;
    }

    .action-list {
      margin: 0;
      padding-left: 1.2em;
    }

    .action-list li {
      margin-bottom: 8px;
      line-height: 1.75;
      font-size: 15px;
    }

    .notice {
      margin-top: 18px;
      padding: 13px 14px;
      background: var(--notice);
      border-left: 5px solid var(--notice-line);
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
    }

    .button-area {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .nav-button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s, opacity 0.15s, background 0.15s;
    }

    .nav-button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .prev-button {
      background: #e6ebf2;
      color: #263142;
    }

    .next-button {
      background: var(--blue);
      color: #fff;
    }

    .nav-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .progress {
      margin-top: 20px;
      height: 8px;
      background: #e2e7ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--blue);
      width: 0%;
      transition: width 0.3s;
    }

    @media (max-width: 820px) {
      .manual-container {
        padding: 22px 14px 28px;
      }

      .manual-title h1 {
        font-size: 23px;
      }

      .manual-layout {
        gap: 22px;
      }

      .description-area {
        width: 100%;
        padding: 20px;
      }

      .phone-frame {
        width: 280px;
        height: 560px;
        border-radius: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="manual-container">
    <div class="manual-title">
      <h1>デジタル認証アプリ セットアップマニュアル</h1>
      <p>セットアップ手順書と同じ11ステップで、初回の利用登録を完了します。</p>
    </div>

    <div class="manual-layout">
      <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen"></div>
      </div>

      <section class="description-area" aria-live="polite">
        <div class="step-count" id="stepCount"></div>
        <h2 id="stepTitle"></h2>
        <p id="stepDescription"></p>
        <ul class="action-list" id="stepActions"></ul>
        <div class="notice" id="stepNotice"></div>

        <div class="button-area">
          <button class="nav-button prev-button" id="prevButton" type="button">戻る</button>
          <button class="nav-button next-button" id="nextButton" type="button">次へ</button>
        </div>

        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const steps = [
      {
        title: "アプリを起動する",
        description: "ホーム画面からデジタル認証アプリを開きます。",
        actions: [
          "ホーム画面で「デジタル認証」アプリのアイコンをタップします。",
          "起動後、アプリのロゴ画面が表示されるまで待ちます。"
        ],
        notice: "アプリが見つからない場合は、端末内検索でアプリ名を入力して探します。",
        screenImage: "images/step1.png",
        guide: {
          box: "left: 18px; top: 18px; width: 82px; height: 56px;",
          label: "left: 24px; top: 86px;",
          text: "アプリをタップ"
        }
      },
      {
        title: "利用登録を開始する",
        description: "初回登録の流れを確認し、利用登録を開始します。",
        actions: [
          "「アプリの利用登録をはじめます」画面で、登録の流れを確認します。",
          "画面下部の「はじめる」をタップします。"
        ],
        notice: "この後、利用規約、プライバシーポリシー、端末ロック設定、暗証番号入力、カード読み取りの順で進みます。",
        screenImage: "images/step2.png",
        guide: {
          box: "left: 24px; bottom: 28px; width: 240px; height: 44px;",
          label: "left: 96px; bottom: 86px;",
          text: "はじめる"
        }
      },
      {
        title: "利用規約に同意する",
        description: "利用規約の内容を確認して、次へ進みます。",
        actions: [
          "利用規約の内容を確認します。",
          "「利用規約に同意」にチェックを入れます。",
          "「次へ」をタップします。"
        ],
        notice: "内容を確認してからチェックを入れてください。",
        screenImage: "images/step3.png",
        guide: {
          box: "left: 22px; bottom: 88px; width: 240px; height: 42px;",
          label: "left: 72px; bottom: 144px;",
          text: "チェック"
        }
      },
      {
        title: "プライバシーポリシーに同意する",
        description: "プライバシーポリシーの内容を確認して、次へ進みます。",
        actions: [
          "プライバシーポリシーの内容を確認します。",
          "「プライバシーポリシーに同意」にチェックを入れます。",
          "「次へ」をタップします。"
        ],
        notice: "同意欄にチェックを入れると、「次へ」ボタンを押せるようになります。",
        screenImage: "images/step4.png",
        guide: {
          box: "left: 22px; bottom: 88px; width: 240px; height: 42px;",
          label: "left: 72px; bottom: 144px;",
          text: "チェック"
        }
      },
      {
        title: "端末のロックを設定する",
        description: "アプリへ安全にログインするため、端末ロックを設定します。",
        actions: [
          "「デバイスのロックの設定」画面で内容を確認します。",
          "「設定」をタップします。",
          "スマートフォン側の案内に従い、PINやパターンなどを設定します。"
        ],
        notice: "すでに端末ロックを設定済みの場合は、確認だけで次へ進むことがあります。",
        screenImage: "images/step5.png",
        guide: {
          box: "left: 24px; bottom: 28px; width: 240px; height: 44px;",
          label: "left: 112px; bottom: 86px;",
          text: "設定"
        }
      },
      {
        title: "暗証番号を入力する",
        description: "マイナンバーカードの利用者証明用電子証明書の暗証番号を入力します。",
        actions: [
          "「暗証番号の入力」画面で、4桁の暗証番号を入力します。",
          "入力内容を確認し、画面右下の「次へ」をタップします。",
          "暗証番号が分からない場合は、画面内の「暗証番号がわからない」を確認します。"
        ],
        notice: "暗証番号を複数回間違えるとロックされる場合があります。落ち着いて確認しながら入力してください。",
        screenImage: "images/step6.png",
        guide: {
          box: "right: 12px; bottom: 20px; width: 68px; height: 42px;",
          label: "right: 10px; bottom: 78px;",
          text: "次へ"
        }
      },
      {
        title: "マイナンバーカードの読み取りを開始する",
        description: "カードの置き方を確認して、読み取りを開始します。",
        actions: [
          "マイナンバーカードを平らな場所に置きます。",
          "スマートフォンの背面をカードにぴったり合わせます。",
          "「読み取り開始」をタップします。"
        ],
        notice: "スマートフォンの機種によって読み取り位置が異なります。うまくいかない場合は位置を少しずつ調整します。",
        screenImage: "images/step7.png",
        guide: {
          box: "left: 24px; bottom: 28px; width: 240px; height: 44px;",
          label: "left: 86px; bottom: 86px;",
          text: "読み取り開始"
        }
      },
      {
        title: "カードとスマートフォンの位置を合わせる",
        description: "画面の案内どおり、カードにスマートフォンをかざします。",
        actions: [
          "スマートフォンをカードにかざしたまま動かさず待ちます。",
          "うまく読み取れない場合は、「端末ごとの読み取り位置をみる」を確認します。",
          "ケースやカバーがある場合は、外すと読み取りやすくなることがあります。"
        ],
        notice: "読み取りが完了するまで、カードとスマートフォンを離さないでください。",
        screenImage: "images/step8.png",
        guide: {
          box: "left: 18px; bottom: 104px; width: 252px; height: 218px;",
          label: "left: 68px; bottom: 338px;",
          text: "位置を合わせる"
        }
      },
      {
        title: "読み取り完了まで待つ",
        description: "送信中の表示が出たら、そのまま待ちます。",
        actions: [
          "「サーバーに送信中」「カードに送信中」などの表示中は操作せず待ちます。",
          "読み取り中はカードとスマートフォンの位置をずらさないようにします。"
        ],
        notice: "通信や読み取りの処理中にアプリを閉じないでください。",
        screenImage: "images/step9.png",
        guide: {
          box: "left: 78px; top: 246px; width: 132px; height: 86px;",
          label: "left: 88px; top: 348px;",
          text: "そのまま待つ"
        }
      },
      {
        title: "登録完了を確認する",
        description: "利用登録が完了したことを確認します。",
        actions: [
          "「アプリの利用登録が完了しました」と表示されたら登録完了です。",
          "「閉じる」をタップします。"
        ],
        notice: "完了画面が表示されたら、初回セットアップは完了しています。",
        screenImage: "images/step10.png",
        guide: {
          box: "left: 24px; bottom: 28px; width: 240px; height: 44px;",
          label: "left: 106px; bottom: 86px;",
          text: "閉じる"
        }
      },
      {
        title: "ホーム画面を確認する",
        description: "登録後のホーム画面が表示されることを確認します。",
        actions: [
          "ホーム画面に「認証の方法」「署名の方法」が表示されることを確認します。",
          "以後、行政や民間サービスで本人確認や署名が必要になった際に、このアプリが開きます。"
        ],
        notice: "これでデジタル認証アプリのセットアップは完了です。",
        screenImage: "images/step11.png",
        guide: {
          box: "left: 28px; top: 392px; width: 232px; height: 124px;",
          label: "left: 86px; top: 530px;",
          text: "表示を確認"
        }
      }
    ];

    let currentStep = 0;

    const phoneScreen = document.getElementById("phoneScreen");
    const stepCount = document.getElementById("stepCount");
    const stepTitle = document.getElementById("stepTitle");
    const stepDescription = document.getElementById("stepDescription");
    const stepActions = document.getElementById("stepActions");
    const stepNotice = document.getElementById("stepNotice");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const progressBar = document.getElementById("progressBar");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStep() {
      const step = steps[currentStep];
      const guideHtml = step.guide
        ? `<div class="tap-guide" style="${step.guide.box}"></div><div class="tap-label" style="${step.guide.label}">${escapeHtml(step.guide.text)}</div>`
        : "";

      phoneScreen.innerHTML = `<img src="${step.screenImage}" alt="${escapeHtml(step.title)}の画面">${guideHtml}`;
      stepCount.textContent = `Step ${currentStep + 1} / ${steps.length}`;
      stepTitle.textContent = step.title;
      stepDescription.textContent = step.description;
      stepActions.innerHTML = step.actions.map((action) => `<li>${escapeHtml(action)}</li>`).join("");
      stepNotice.textContent = step.notice;

      prevButton.disabled = currentStep === 0;
      nextButton.textContent = currentStep === steps.length - 1 ? "完了" : "次へ";
      progressBar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
    }

    prevButton.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    });

    nextButton.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
      } else {
        alert("デジタル認証アプリのセットアップ手順は以上です。");
      }
    });

    renderStep();
  </script>
</body>
</html>
