<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デジタル認証アプリ セットアップマニュアル</title>
  <style>
    :root {
      --blue: #0036d9;
      --blue-dark: #06237a;
      --ink: #202124;
      --muted: #667085;
      --paper: #ffffff;
      --bg: #f3f6fb;
      --notice: #fff7db;
      --notice-line: #e8aa00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .manual-container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    .manual-title {
      text-align: center;
      margin-bottom: 24px;
    }

    .manual-title h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.35;
      color: var(--blue-dark);
    }

    .manual-title p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .manual-layout {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .phone-frame {
      width: min(320px, 86vw);
      padding: 10px;
      background: #101216;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(16, 24, 40, 0.18);
      flex: 0 0 auto;
    }

    .phone-screen {
      width: 100%;
      aspect-ratio: 37 / 80;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .description-area {
      width: 460px;
      background: var(--paper);
      border: 1px solid rgba(216, 222, 232, 0.9);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    .step-count {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .description-area h2 {
      margin: 0 0 12px;
      font-size: 23px;
      line-height: 1.45;
      color: var(--blue-dark);
    }

    .description-area p {
      margin: 0 0 14px;
      line-height: 1.85;
      font-size: 15px;
    }

    .action-list {
      margin: 0;
      padding-left: 1.2em;
    }

    .action-list li {
      margin-bottom: 8px;
      line-height: 1.75;
      font-size: 15px;
    }

    .notice {
      margin-top: 18px;
      padding: 13px 14px;
      background: var(--notice);
      border-left: 5px solid var(--notice-line);
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
    }

    .button-area {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .nav-button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s, opacity 0.15s;
    }

    .nav-button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .prev-button {
      background: #e6ebf2;
      color: #263142;
    }

    .next-button {
      background: var(--blue);
      color: #fff;
    }

    .nav-button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .progress {
      margin-top: 20px;
      height: 8px;
      background: #e2e7ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--blue);
      width: 0%;
      transition: width 0.3s;
    }

    @media (max-width: 820px) {
      .manual-container {
        padding: 22px 14px 28px;
      }

      .manual-title h1 {
        font-size: 23px;
      }

      .manual-layout {
        gap: 22px;
      }

      .description-area {
        width: 100%;
        padding: 20px;
      }

      .phone-frame {
        width: min(300px, 86vw);
      }
    }
  </style>
</head>

<body>
  <main class="manual-container">
    <div class="manual-title">
      <h1>デジタル認証アプリ セットアップマニュアル</h1>
      <p>初回起動時のセットアップ方法（Android）</p>
    </div>

    <div class="manual-layout">
      <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen"></div>
      </div>

      <section class="description-area" aria-live="polite">
        <div class="step-count" id="stepCount"></div>
        <h2 id="stepTitle"></h2>
        <p id="stepDescription"></p>
        <ul class="action-list" id="stepActions"></ul>
        <div class="notice" id="stepNotice"></div>

        <div class="button-area">
          <button class="nav-button prev-button" id="prevButton" type="button">戻る</button>
          <button class="nav-button next-button" id="nextButton" type="button">次へ</button>
        </div>

        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const steps = [
      {
        title: "アプリを起動する",
        description: "ホーム画面などから「デジタル認証」アプリを開きます。",
        actions: [
          "「デジタル認証」アプリのアイコンをタップします。",
          "起動後、案内画面が表示されるまで待ちます。"
        ],
        notice: "アプリが見つからない場合は、「Google Playストア」からインストールします。",
        screenImage: "images/step1.png"
      },
      {
        title: "本人確認の案内を確認する",
        description: "マイナンバーカードを使った本人確認の案内画面を確認します。",
        actions: [
          "「マイナンバーカードで簡単に本人確認」の画面内容を確認します。",
          "画面下部の「次へ」をタップします。"
        ],
        notice: "この後、アプリの利用登録画面へ進みます。",
        screenImage: "images/step2.png"
      },
      {
        title: "利用登録を開始する",
        description: "初回登録の流れを確認し、利用登録を開始します。",
        actions: [
          "「アプリの利用登録をはじめます」画面で、登録の流れを確認します。",
          "画面下部の「はじめる」をタップします。"
        ],
        notice: "利用規約、プライバシーポリシー、端末ロック設定、暗証番号入力、カード読み取りの順で進みます。",
        screenImage: "images/step3.png"
      },
      {
        title: "利用規約に同意する",
        description: "利用規約の内容を確認して、次へ進みます。",
        actions: [
          "利用規約の内容を確認します。",
          "「利用規約に同意」にチェックを入れます。",
          "「次へ」をタップします。"
        ],
        notice: "同意欄にチェックを入れると、「次へ」ボタンを押せるようになります。",
        screenImage: "images/step4.png"
      },
      {
        title: "プライバシーポリシーに同意する",
        description: "プライバシーポリシーの内容を確認して、次へ進みます。",
        actions: [
          "プライバシーポリシーの内容を確認します。",
          "「プライバシーポリシーに同意」にチェックを入れます。",
          "「次へ」をタップします。"
        ],
        notice: "同意欄にチェックを入れると、「次へ」ボタンを押せるようになります。",
        screenImage: "images/step5.png"
      },
      {
        title: "端末のロックを設定する",
        description: "アプリへ安全にログインするため、端末ロックを設定します。",
        actions: [
          "「デバイスのロックの設定」画面で内容を確認します。",
          "「設定」をタップします。",
          "スマートフォン側の案内に従い、PINやパターンなどを設定します。"
        ],
        notice: "すでに端末ロックを設定済みの場合は、確認だけで次へ進むことがあります。",
        screenImage: "images/step6.png"
      },
      {
        title: "カードと暗証番号を用意する",
        description: "マイナンバーカードと暗証番号を手元に用意します。",
        actions: [
          "マイナンバーカードを手元に用意します。",
          "利用者証明用電子証明書の暗証番号を確認します。",
          "準備ができたら「次へ」をタップします。"
        ],
        notice: "暗証番号が分からない場合は、市役所などで再設定手続きが必要です。",
        screenImage: "images/step7.png"
      },
      {
        title: "暗証番号を入力する",
        description: "マイナンバーカードの利用者証明用電子証明書の暗証番号を入力します。",
        actions: [
          "「暗証番号の入力」画面で、4桁の暗証番号を入力します。",
          "入力内容を確認し、画面右下の「次へ」をタップします。",
        ],
        notice: "暗証番号を複数回間違えるとロックされる場合があります。落ち着いて確認しながら入力してください。",
        screenImage: "images/step8.png"
      },
      {
        title: "マイナンバーカードの読み取りを開始する",
        description: "カードの置き方を確認して、読み取りを開始します。",
        actions: [
          "マイナンバーカードを平らな場所に置きます。",
          "スマートフォンの背面をカードにぴったり合わせます。",
          "「読み取り開始」をタップします。"
        ],
        notice: "スマートフォンの機種によって読み取り位置が異なります。うまくいかない場合は位置を少しずつ調整します。",
        screenImage: "images/step9.png"
      },
      {
        title: "カードとスマートフォンの位置を合わせる",
        description: "画面の案内どおり、カードにスマートフォンをかざします。",
        actions: [
          "スマートフォンをカードにかざしたまま動かさず待ちます。",
          "うまく読み取れない場合は、「端末ごとの読み取り位置をみる」を確認します。",
          "ケースやカバーがある場合は、外すと読み取りやすくなることがあります。"
        ],
        notice: "読み取りが完了するまで、カードとスマートフォンを離さないでください。",
        screenImage: "images/step10.png"
      },
      {
        title: "読み取り完了まで待つ",
        description: "送信中の表示が出たら、そのまま待ちます。",
        actions: [
          "「サーバーに送信中」などの表示中は操作せず待ちます。",
          "読み取り中はカードとスマートフォンの位置をずらさないようにします。"
        ],
        notice: "通信や読み取りの処理中にアプリを閉じないでください。",
        screenImage: "images/step11.png"
      },
      {
        title: "登録完了を確認する",
        description: "利用登録が完了したことを確認します。",
        actions: [
          "「アプリの利用登録が完了しました」と表示されたら登録完了です。",
          "「閉じる」をタップします。"
        ],
        notice: "完了画面が表示されたら、初回セットアップは完了しています。",
        screenImage: "images/step12.png"
      },
      {
        title: "ホーム画面を確認する",
        description: "登録後のホーム画面が表示されることを確認します。",
        actions: [
          "ホーム画面に「認証の方法」「署名の方法」が表示されることを確認します。",
          "以後、行政や民間サービスで本人確認や署名が必要になった際に、このアプリが開きます。"
        ],
        notice: "これでデジタル認証アプリのセットアップは完了です。",
        screenImage: "images/step13.png"
      }
    ];

    let currentStep = 0;

    const phoneScreen = document.getElementById("phoneScreen");
    const stepCount = document.getElementById("stepCount");
    const stepTitle = document.getElementById("stepTitle");
    const stepDescription = document.getElementById("stepDescription");
    const stepActions = document.getElementById("stepActions");
    const stepNotice = document.getElementById("stepNotice");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const progressBar = document.getElementById("progressBar");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStep() {
      const step = steps[currentStep];

      phoneScreen.innerHTML = `<img src="${step.screenImage}" alt="${escapeHtml(step.title)}の画面">`;
      stepCount.textContent = `Step ${currentStep + 1} / ${steps.length}`;
      stepTitle.textContent = step.title;
      stepDescription.textContent = step.description;
      stepActions.innerHTML = step.actions.map((action) => `<li>${escapeHtml(action)}</li>`).join("");
      stepNotice.textContent = step.notice;

      prevButton.disabled = currentStep === 0;
      nextButton.textContent = currentStep === steps.length - 1 ? "完了" : "次へ";
      progressBar.style.width = `${((currentStep + 1) / steps.length) * 100}%`;
    }

    prevButton.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    });

    nextButton.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
      } else {
        alert("デジタル認証アプリのセットアップ手順は以上です。");
      }
    });

    renderStep();
  </script>
</body>
</html>
